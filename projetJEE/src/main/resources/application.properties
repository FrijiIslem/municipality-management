spring.application.name=projetJEE
server.port=9090

# MongoDB configuration
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=projet
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.uri=mongodb://localhost:27017/projet

# Disable default datasource configuration
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# Java 17+ module access for LocalDateTime
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Jackson configuration for LocalDateTime
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.write-date-keys-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# JVM arguments for Java 17+ (add to STS VM arguments if needed)
# --add-opens java.base/java.time=ALL-UNNAMED